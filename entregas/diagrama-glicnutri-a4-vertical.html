<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GlicNutri — Fluxo Mermaid (meia A4)</title>
  <style>
    @page { size: A4 portrait; margin: 0; }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #fff;
      color: #1a1a1a;
    }

    @media print {
      body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .no-print { display: none !important; }
    }

    .no-print {
      text-align: center;
      padding: 8px;
      background: #f0f0f0;
    }

    .no-print button {
      padding: 6px 14px;
      font-size: 10pt;
      cursor: pointer;
      background: #0d6b4a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: 600;
    }

    .half-a4 {
      display: flex;
      flex-direction: column;
      width: 210mm;
      height: 148mm;
      max-height: 148mm;
      margin: 0 auto;
      padding: 1mm 1.5mm 0.5mm;
      background: #fff;
      overflow: hidden;
      border-bottom: 1px dashed #ccc;
    }

    .hdr {
      text-align: center;
      margin: 0 0 0.25mm;
      flex-shrink: 0;
    }

    .hdr h1 {
      margin: 0;
      font-size: 7pt;
      font-weight: 800;
      color: #0d6b4a;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .diagram-host {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      overflow: hidden;
    }

    /* Escala uniforme: preenche meia A4 sem refluir texto dentro do SVG */
    .diagram-host .diagram-scale {
      display: block;
      width: 100%;
      height: 100%;
    }

    .diagram-host svg {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <div class="no-print">
    <button type="button" onclick="window.print()">Imprimir / Salvar como PDF</button>
  </div>

  <div class="half-a4">
    <div class="hdr">
      <h1>GLICNUTRI</h1>
    </div>
    <div id="diagram" class="diagram-host" aria-busy="true">
      <div class="diagram-scale" id="diagram-scale"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script>
    (function () {
      var chart = [
        "flowchart TB",
        '  subgraph Acesso["1. Acesso e conta"]',
        "    direction TB",
        "    INTRO[Introdução]",
        "    LOGIN[Login]",
        "    CAD[Cadastro]",
        "    REC[Recuperar senha]",
        "    INTRO --> LOGIN",
        "    LOGIN --> CAD",
        "    LOGIN --> REC",
        "  end",
        "",
        '  subgraph Paciente["2. Paciente"]',
        "    direction TB",
        "    ONB[Onboarding]",
        "    INI[Início]",
        "    MON[Monitoramento]",
        "    HIST[Histórico]",
        "    DIARIO[Diário]",
        "    ASSIST[Assistente]",
        "    CONS[Consultas]",
        "    BEM[Bem-estar]",
        "    PLANO[Plano alimentar]",
        "    PERFIL[Perfil / terapia]",
        "    REFIA[Refeição IA]",
        "    ML[Previsão ML]",
        "    ONB --> INI",
        "    INI --> MON",
        "    INI --> HIST",
        "    INI --> DIARIO",
        "    INI --> ASSIST",
        "    INI --> CONS",
        "    INI --> BEM",
        "    INI --> PLANO",
        "    INI --> PERFIL",
        "    INI --> REFIA",
        "    INI --> ML",
        "  end",
        "",
        '  subgraph Nutri["3. Nutricionista"]',
        "    direction TB",
        "    ININ[Início]",
        "    PAC[Pacientes]",
        "    AG[Agenda]",
        "    SEC[Seção]",
        "    PRONT[Prontuário]",
        "    CONSN[Consulta]",
        "    ININ --> PAC",
        "    ININ --> AG",
        "    ININ --> SEC",
        "    PAC --> PRONT",
        "    PAC --> CONSN",
        "  end",
        "",
        '  subgraph Admin["4. Administração"]',
        "    direction TB",
        "    ADH[Home admin]",
        "    ADA[Auditoria]",
        "    ADL[Logs]",
        "    ADH --> ADA",
        "    ADH --> ADL",
        "  end",
        "",
        '  subgraph Dados["5. Dados"]',
        "    direction TB",
        "    SB[Supabase]",
        "    SVC[Serviços do app]",
        "    SB --> SVC",
        "  end",
        "",
        "  LOGIN --> ONB",
        "  LOGIN --> ININ",
        "  LOGIN --> ADH",
        "  MON --> SVC",
        "  PERFIL --> SVC",
        "  PRONT --> SVC",
      ].join("\n");

      mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        securityLevel: "loose",
        flowchart: {
          useMaxWidth: false,
          htmlLabels: true,
          curve: "basis",
          nodeSpacing: 36,
          rankSpacing: 40,
          padding: 16,
        },
        themeVariables: {
          fontFamily: "Segoe UI, system-ui, sans-serif",
          fontSize: "11px",
          primaryColor: "#ffffff",
          primaryTextColor: "#111111",
          primaryBorderColor: "#222222",
          lineColor: "#333333",
          secondaryColor: "#f4f4f4",
          tertiaryColor: "#ffffff",
          clusterBkg: "#fafafa",
          clusterBorder: "#888888",
          titleColor: "#0d4a35",
        },
      });

      function injectNoWrap(svg) {
        var ns = "http://www.w3.org/2000/svg";
        var st = document.createElementNS(ns, "style");
        st.textContent =
          ".nodeLabel, .nodeLabel div, .nodeLabel p, .edgeLabel, .edgeLabel div, .cluster .label, .cluster .label div { white-space: nowrap !important; max-width: none !important; width: max-content !important; overflow: visible !important; }";
        svg.insertBefore(st, svg.firstChild);
      }

      function applySvgFit(svg) {
        var pad = 10;
        try {
          var bb = svg.getBBox();
          if (bb.width > 0 && bb.height > 0) {
            svg.setAttribute(
              "viewBox",
              bb.x - pad + " " + (bb.y - pad) + " " + (bb.width + 2 * pad) + " " + (bb.height + 2 * pad)
            );
            svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
          }
        } catch (e) {}
        svg.removeAttribute("width");
        svg.removeAttribute("height");
        svg.style.width = "100%";
        svg.style.height = "100%";
      }

      var host = document.getElementById("diagram");
      var scaleWrap = document.getElementById("diagram-scale");
      mermaid
        .render("glicnutri-flow", chart)
        .then(function (out) {
          scaleWrap.innerHTML = out.svg;
          var svg = scaleWrap.querySelector("svg");
          if (svg) {
            injectNoWrap(svg);
            requestAnimationFrame(function () {
              applySvgFit(svg);
              requestAnimationFrame(function () {
                applySvgFit(svg);
              });
            });
          }
          host.setAttribute("aria-busy", "false");
        })
        .catch(function (e) {
          host.innerHTML =
            "<p style=\"padding:8px;font-size:10px;color:#b00\">Erro ao renderizar Mermaid: " +
            String(e && e.message ? e.message : e) +
            "</p>";
          host.setAttribute("aria-busy", "false");
        });

      window.addEventListener("resize", function () {
        var svg = document.querySelector("#diagram-scale svg");
        if (svg) applySvgFit(svg);
      });
      window.addEventListener("beforeprint", function () {
        var svg = document.querySelector("#diagram-scale svg");
        if (svg) applySvgFit(svg);
      });
    })();
  </script>
</body>
</html>
